<!DOCTYPE html>
<html>
<head>
    <title>Registro - Nano Connect</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css?family=Yeon+Sung&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/js/bootstrap.min.js"></script>

    <!-- Firebase SOLO UNO -->
    <script src="https://www.gstatic.com/firebasejs/7.6.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/7.6.2/firebase-database.js"></script>

    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

<center>

    <h1 class="header">
        Nano Connect
        <sup><img src="m2.png"></sup>
    </h1>

    <div class="col-lg-4 col-md-6 col-sm-6 col-xs-11 login_div">

        <img src="logo.png" class="logo">

        <h1>Crear cuenta</h1>

        <br>

        <!-- USERNAME -->
         <input type="text" id="full_name" class="form-control" placeholder="Nombre completo">
         <input type="text" id="user_name" class="form-control" placeholder="Nombre de usuario">
        <br>

        <!-- CURP -->
        <input type="text" id="curp" class="form-control" placeholder="CURP">

        <br>

        <!-- PASSWORD -->
        <div class="input-group">

            <input type="password" id="password" class="form-control" placeholder="Contraseña">

            <span class="input-group-addon" onclick="togglePassword()" style="cursor:pointer;">
                <span class="glyphicon glyphicon-eye-open"></span>
            </span>

        </div>

        <br>

        <button onclick="registrar()" class="btn btn-primary nano-btn">
            Registrarme
        </button>

        <br><br>

        <p id="mensaje"></p>

        <br>

        <a href="login.html">Ya tengo cuenta</a>

    </div>

</center>

<script src="registro.js"></script>

</body>
</html>

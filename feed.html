<!DOCTYPE html>
<html>
<head>
    <title>Nano Connect Feed</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/js/bootstrap.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/7.6.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/7.6.2/firebase-database.js"></script>

    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

<center>

    <h1 class="header">
        Nano Connect Feed
        <sup><img src="m2.png"></sup>
    </h1>

    <!-- 🧠 CREAR POST -->
    <input id="post_text" class="form-control" style="width:300px;" placeholder="¿Qué quieres publicar?">
    <br>

    <input id="post_img" class="form-control" style="width:300px;" placeholder="URL imagen (opcional)">
    <br>

    <button onclick="crearPost()" class="btn btn-primary">
        Publicar
    </button>

    <hr>

    <!-- 📡 FEED -->
    <div id="feed"></div>

</center>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDA4gAFeWcYE2_w3N-7Os8TXzXMyljDak8",
    authDomain: "kwitter-247d6.firebaseapp.com",
    databaseURL: "https://kwitter-247d6-default-rtdb.firebaseio.com",
    projectId: "kwitter-247d6",
    storageBucket: "kwitter-247d6.firebasestorage.app",
    messagingSenderId: "599266540979",
    appId: "1:599266540979:web:03ba14e476e0e2f9961fc6"
};

firebase.initializeApp(firebaseConfig);

// 👤 usuario
var user_name = localStorage.getItem("user_name");

// 🧵 CREAR POST
function crearPost() {

    var text = document.getElementById("post_text").value;
    var img = document.getElementById("post_img").value;

    if (text.trim() === "" && img.trim() === "") return;

    firebase.database().ref("posts").push({
        user: user_name,
        text: text,
        img: img,
        likes: 0
    });

    document.getElementById("post_text").value = "";
    document.getElementById("post_img").value = "";
}

// 📡 CARGAR FEED
firebase.database().ref("posts").on("value", function(snapshot) {

    document.getElementById("feed").innerHTML = "";

    snapshot.forEach(function(post) {

        var data = post.val();

        var imgTag = "";

        if (data.img) {
            imgTag = "<br><img src='" + data.img + "' style='max-width:200px;border-radius:10px;'>";
        }

        document.getElementById("feed").innerHTML +=
        "<div class='post' style='background:#fff;padding:10px;margin:10px;border-radius:10px;'>" +
            "<h4>👤 " + data.user + "</h4>" +
            "<p>" + data.text + "</p>" +
            imgTag +
            "<br><button onclick=\"likePost('" + post.key + "', " + data.likes + ")\">" +
                "❤️ Like " + data.likes +
            "</button>" +
        "</div>";
    });
});

// ❤️ LIKE
function likePost(id, likes) {

    firebase.database().ref("posts/" + id).update({
        likes: likes + 1
    });
}
</script>

</body>
</html>
